<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Senderos Tenerife Natural 🌿</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f5e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .map-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 1000px;
            text-align: center;
        }
        .user-profile {
            background: #f1f8e9;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #c8e6c9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { color: #2e7d32; margin: 10px 0; }
        #map {
            height: 500px;
            width: 100%;
            border-radius: 15px;
            border: 2px solid #a5d6a7;
            cursor: crosshair;
        }
        .popup-clima { font-weight: bold; color: #1565c0; display: block; margin-top: 5px; }
        .popup-bus { font-size: 0.9em; color: #d32f2f; margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 5px; }
        .recomendacion-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 5px;
        }
        .btn-fav {
            background: #ffd54f;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            width: 100%;
        }
        .btn-fav:hover { background: #ffca28; }
        .btn-detalle {
            background: #2e7d32;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        .btn-detalle:hover { background: #1b5e20; }
        .btn-gestion {
            margin-top: 20px;
            display: inline-block;
            padding: 12px 25px;
            background-color: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
        /* Estilos para paradas de guaguas */
        .tooltip-guagua {
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            padding: 4px 8px;
        }
        .tiempo-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }
        .linea-badge {
            background: #1565c0;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="map-card">
    <div class="user-profile">
        <span>👤 <b>Usuario:</b> Juan_Senderista</span>
        <span>💪 <b>Nivel Físico:</b> Principiante (Bajo)</span>
    </div>

    <h1>Explora Tenerife Natural 🌿</h1>
    <p>Clima, Guaguas y Recomendaciones Personalizadas. UwU</p>

    <div id="map"></div>

    <a href="/senderos" class="btn-gestion">⚙️ Gestionar mis Senderos</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const USUARIO_SESION = { id: 1, nivel: 1 };

    const map = L.map('map').setView([28.2915, -16.6291], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // --- SECCIÓN 1: CARGA DE SENDEROS ---
    fetch('http://localhost:8080/api/senderos')
        .then(response => response.json())
        .then(senderos => {
            senderos.forEach(s => {
                if(s.latitud && s.longitud) {
                    const marker = L.marker([s.latitud, s.longitud]).addTo(map);

                    const niveles = { "Baja": 1, "Media": 2, "Alta": 3 };
                    const nivelRuta = niveles[s.dificultad] || 1;

                    let msgRec = "";
                    let colorRec = "";

                    if (USUARIO_SESION.nivel >= nivelRuta) {
                        msgRec = "✅ Apto para tu nivel";
                        colorRec = "#e8f5e9; color: #2e7d32";
                    } else {
                        msgRec = "⚠️ Exceso de esfuerzo";
                        colorRec = "#ffebee; color: #c62828";
                    }

                    let popupContent = `
                        <div style="text-align:center; min-width: 180px;">
                            <b style="font-size:1.1em; color:#2e7d32;">${s.nombreSendero}</b><br>
                            <div class="recomendacion-badge" style="background: ${colorRec}">${msgRec}</div><br>
                            <span class="popup-clima">🌡️ ${s.estadoMeteorologico || 'Cargando...'}</span>
                            <div id="bus-info-${s.id}" class="popup-bus">⌛ Buscando guaguas...</div>

                            <a href="/senderos/detalle/${s.id}" class="btn-detalle">📖 Ver detalles y reseñas</a>
                            <button class="btn-fav" onclick="marcarFavorito(${s.id})">⭐ Guardar Favorito</button>
                        </div>
                    `;
                    marker.bindPopup(popupContent);

                    marker.on('popupopen', () => {
                        fetch(`http://localhost:8080/api/senderos/${s.id}/transporte`)
                            .then(res => res.json())
                            .then(guaguas => {
                                const container = document.getElementById(`bus-info-${s.id}`);
                                if(guaguas.length > 0) {
                                    let html = "<b>🚌 Guaguas:</b><br>";
                                    guaguas.forEach(g => {
                                        html += `L-${g.linea}: ${g.tiempoLlegada} min ⏱️<br>`;
                                    });
                                    container.innerHTML = html;
                                } else {
                                    container.innerHTML = "❌ No hay guaguas cerca";
                                }
                            });
                    });
                }
            });
        });

    // --- SECCIÓN 2: CARGA DE PARADAS TITSA (CORREGIDO) ---
    fetch('http://localhost:8080/api/guaguas/paradas') // Asegúrate que esta ruta en tu StopController sea correcta
    .then(response => response.json())
    .then(paradas => {
        paradas.forEach(p => {
            if(p.latitude && p.longitude) {
                const busMarker = L.circleMarker([p.latitude, p.longitude], {
                    radius: 6,
                    fillColor: "#1565c0",
                    color: "#fff",
                    weight: 2,
                    fillOpacity: 0.9
                }).addTo(map);

                busMarker.bindTooltip(`🚌 Parada: ${p.name}`, {
                    className: 'tooltip-guagua',
                    direction: 'top'
                });

                busMarker.on('click', function(e) {
                    L.DomEvent.stopPropagation(e);

                    // CORRECCIÓN URL: Usamos stopUrl del CSV (p.stopUrl) que es la que funciona.
                    // Si no existe, usamos la de correspondencias que vimos en tu archivo.
                    const urlTitsaOficial = p.stopUrl ? p.stopUrl : `http://www.titsa.com/correspondencias.php?idc=${p.id}`;

                    const popupBus = `
                        <div style="min-width: 220px; text-align:center;">
                            <b style="color:#1565c0; font-size:1.1em;">🚏 ${p.name}</b><br>
                            <small style="color:#666;">ID Parada: ${p.id}</small><hr>

                            <div id="real-time-${p.id}" style="text-align:left; margin-bottom:10px;">

                            </div>

                            <a href="${urlTitsaOficial}" target="_blank"
                               style="background-color: #1565c0; color: white; padding: 10px; border-radius: 8px; text-decoration: none; display: block; font-weight: bold; font-size: 0.9em; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                               🚌 Ver Guagua en TITSA (Líneas)
                            </a>
                        </div>
                    `;
                    busMarker.bindPopup(popupBus).openPopup();

                    // CORRECCIÓN API: Ahora llamamos a /api/horarios/parada/ en lugar de /api/guaguas/parada
                    fetch(`http://localhost:8080/api/horarios/parada/${p.id}`)
                        .then(res => res.json())
                        .then(tiempos => {
                            const div = document.getElementById(`real-time-${p.id}`);
                            if(tiempos && tiempos.length > 0) {
                                let html = "";
                                tiempos.forEach(t => {
                                    html += `
                                        <div class="tiempo-item">
                                            <span class="linea-badge">${t.linea}</span>
                                            <span><b>${t.tiempoLlegada}</b> ⏱️</span>
                                        </div>`;
                                });
                                div.innerHTML = html;
                            }
                        })
                        .catch(() => {
                            const div = document.getElementById(`real-time-${p.id}`);
                            if(div) div.innerHTML = "<div style='color:red; text-align:center;'>⚠️ Error de conexión</div>";
                        });
                });
            }
        });
    });

    // --- SECCIÓN 3: FUNCIONES DE FAVORITOS ---
    function marcarFavorito(senderoId) {
        const params = new URLSearchParams();
        params.append('usuarioId', USUARIO_SESION.id);

        fetch(`/senderos/favorito/${senderoId}`, {
            method: 'POST',
            body: params
        })
        .then(res => res.text())
        .then(data => {
            alert(data);
        })
        .catch(err => console.error("Error al guardar favorito"));
    }

    // --- SECCIÓN 4: MARCADOR DE COORDENADAS (CLIC EN MAPA) ---
    var tempMarker;
    map.on('click', function(e) {
        // Este evento solo se disparará si el clic NO fue en una parada o sendero
        var lat = e.latlng.lat.toFixed(6);
        var lng = e.latlng.lng.toFixed(6);
        if (tempMarker) map.removeLayer(tempMarker);
        tempMarker = L.marker([lat, lng]).addTo(map)
            .bindPopup(`<b>📍 Coordenadas:</b><br>Lat: ${lat}<br>Lng: ${lng}`).openPopup();
    });
</script>
</body>
</html>
