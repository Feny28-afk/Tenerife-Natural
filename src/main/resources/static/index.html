<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Senderos Tenerife Natural 🌿</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f5e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .map-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 1000px;
            text-align: center;
        }
        .user-profile {
            background: #f1f8e9;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #c8e6c9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { color: #2e7d32; margin: 10px 0; }
        #map {
            height: 500px;
            width: 100%;
            border-radius: 15px;
            border: 2px solid #a5d6a7;
            cursor: crosshair;
        }
        .popup-clima { font-weight: bold; color: #1565c0; display: block; margin-top: 5px; }
        .popup-bus { font-size: 0.9em; color: #d32f2f; margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 5px; }
        .recomendacion-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 5px;
        }
        .btn-fav {
            background: #ffd54f;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        .btn-fav:hover { background: #ffca28; }
        .btn-gestion {
            margin-top: 20px;
            display: inline-block;
            padding: 12px 25px;
            background-color: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="map-card">
    <div class="user-profile">
        <span>👤 <b>Usuario:</b> Juan_Senderista</span>
        <span>💪 <b>Nivel Físico:</b> Principiante (Bajo)</span>
    </div>

    <h1>Explora Tenerife Natural 🌿</h1>
    <p>Clima, Guaguas y Recomendaciones Personalizadas. UwU</p>

    <div id="map"></div>

    <a href="/senderos" class="btn-gestion">⚙️ Gestionar mis Senderos</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // SPRINT 6: Usuario logueado (Simulado para pruebas con ID 1 y Nivel 1)
    const USUARIO_SESION = { id: 1, nivel: 1 };

    const map = L.map('map').setView([28.2915, -16.6291], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    fetch('http://localhost:8080/api/senderos')
        .then(response => response.json())
        .then(senderos => {
            senderos.forEach(s => {
                if(s.latitud && s.longitud) {
                    const marker = L.marker([s.latitud, s.longitud]).addTo(map);

                    // --- LÓGICA DE RECOMENDACIÓN FÍSICA ---
                    const niveles = { "Baja": 1, "Media": 2, "Alta": 3 };
                    const nivelRuta = niveles[s.dificultad] || 1;

                    let msgRec = "";
                    let colorRec = "";

                    if (USUARIO_SESION.nivel >= nivelRuta) {
                        msgRec = "✅ Apto para tu nivel";
                        colorRec = "#e8f5e9; color: #2e7d32";
                    } else {
                        msgRec = "⚠️ Exceso de esfuerzo";
                        colorRec = "#ffebee; color: #c62828";
                    }

                    let popupContent = `
                        <div style="text-align:center">
                            <b style="font-size:1.1em; color:#2e7d32;">${s.nombreSendero}</b><br>
                            <div class="recomendacion-badge" style="background: ${colorRec}">${msgRec}</div><br>
                            <span class="popup-clima">🌡️ ${s.estadoMeteorologico || 'Cargando...'}</span>
                            <div id="bus-info-${s.id}" class="popup-bus">⌛ Buscando guaguas...</div>
                            <button class="btn-fav" onclick="marcarFavorito(${s.id})">⭐ Guardar Favorito</button>
                        </div>
                    `;
                    marker.bindPopup(popupContent);

                    marker.on('popupopen', () => {
                        fetch(`http://localhost:8080/api/senderos/${s.id}/transporte`)
                            .then(res => res.json())
                            .then(guaguas => {
                                const container = document.getElementById(`bus-info-${s.id}`);
                                if(guaguas.length > 0) {
                                    let html = "<b>🚌 Guaguas:</b><br>";
                                    guaguas.forEach(g => {
                                        html += `L-${g.linea}: ${g.tiempoLlegada} min ⏱️<br>`;
                                    });
                                    container.innerHTML = html;
                                } else {
                                    container.innerHTML = "❌ No hay guaguas cerca";
                                }
                            });
                    });
                }
            });
        });

    // SPRINT 6: Función para guardar en la cuenta personalizada
    function marcarFavorito(senderoId) {
        const params = new URLSearchParams();
        params.append('usuarioId', USUARIO_SESION.id);

        fetch(`/senderos/favorito/${senderoId}`, {
            method: 'POST',
            body: params
        })
        .then(res => res.text())
        .then(data => {
            alert(data); // Muestra "¡Añadido a tus favoritos! ⭐"
        })
        .catch(err => console.error("Error al guardar favorito"));
    }

    var tempMarker;
    map.on('click', function(e) {
        var lat = e.latlng.lat.toFixed(6);
        var lng = e.latlng.lng.toFixed(6);
        if (tempMarker) map.removeLayer(tempMarker);
        tempMarker = L.marker([lat, lng]).addTo(map)
            .bindPopup(`<b>📍 Coordenadas:</b><br>Lat: ${lat}<br>Lng: ${lng}`).openPopup();
    });
</script>
</body>
</html>
