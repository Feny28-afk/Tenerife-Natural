<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Senderos Tenerife Natural 🌿</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" th:href="@{/css/index.css}" />
</head>
<body>

<div class="map-card">
    <div class="user-profile" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="nivel-selector" style="background: #f0f4f1; padding: 10px; border-radius: 8px; border-left: 4px solid #2e7d32;">
            <label style="font-weight: bold; color: #2e7d32;">Tu Nivel: </label>
            <select id="selector-nivel" onchange="cambiarNivelFisico(this.value)" style="padding: 5px; border-radius: 4px;">
                <option value="1">Principiante</option>
                <option value="2">Aficionado</option>
                <option value="3">Experto</option>
            </select>
        </div>
        <button onclick="cerrarSesion()" class="btn-logout">🚪 Cerrar Sesión</button>
    </div>

    <h1>Explora Tenerife Natural 🌿</h1>
    <p>Clima, Guaguas y Recomendaciones Personalizadas.</p>

    <div id="map"></div>

    <a th:href="@{/senderos}" class="btn-gestion">⚙️ Gestionar mis Senderos</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:src="@{/js/index.js}"></script>
</body>
</html>
