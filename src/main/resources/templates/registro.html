<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Tenerife Natural</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login_registro.css}">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/images/logo.svg}" alt="Logo" width="40" height="40">
            Tenerife Natural
        </a>
    </div>
</nav>

<div class="container-fluid login-card position-absolute top-50 start-50 translate-middle shadow-lg">
    <h2 class="text-center mb-4" style="color: #2e7d32;">Regístrate</h2>

    <form th:action="@{/registro}" method="POST">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="floatingUsername" name="username" placeholder="Nombre de usuario" required>
            <label for="floatingUsername">Nombre de usuario</label>
        </div>

        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="floatingInput" name="email" placeholder="nombre@ejemplo.com" required>
            <label for="floatingInput">Correo electrónico</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Contraseña" required>
            <label for="floatingPassword">Contraseña</label>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100 mb-3">Registrarse</button>

        <div class="registro-link text-center">
            ¿Ya tienes cuenta? <br>
            <a th:href="@{/login}" class="text-success fw-bold">Entra aquí</a>
        </div>
    </form>
</div>

<footer class="bg-body-tertiary text-center py-3 mt-auto fixed-bottom border-top">
    <p class="mb-0 text-muted small">© 2026 Tenerife Natural</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
