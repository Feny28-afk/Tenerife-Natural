<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Tenerife Natural</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login_registro.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand">
            <img th:src="@{/images/logo.svg}" alt="Logo" width="40" height="40">
            Tenerife Natural
        </a>
    </div>
</nav>

<div class="container-fluid login-card position-absolute top-50 start-50 translate-middle">
    <div th:if="${param.error}" class="error-msg">Usuario o contraseña incorrectos</div>
    <div th:if="${param.logout}" class="success-msg">Has cerrado sesión correctamente</div>

    <form th:action="@{/login}" method="post">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="floatingInput" name="username" placeholder="Tu usuario" required>
            <label for="floatingInput">Nombre de usuario</label>
        </div>
        <div class="form-floating">
            <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password" required>
            <label for="floatingPassword">Contraseña</label>
        </div>
        <button type="submit" class="btn btn-primary btn-login mt-3">Entrar</button>
        <div class="registro-link mt-2">
            ¿No tienes cuenta? <br>
            <a th:href="@{/registro}">Regístrate aquí gratis</a>
        </div>
    </form>
</div>
</body>
</html>
