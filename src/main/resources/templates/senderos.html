<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Explora Tenerife Natural</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" th:href="@{/css/senderos.css}" />
    <style>
        .toast { border-radius: 12px; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .bg-success { background-color: #2e7d32 !important; }
        .bg-danger { background-color: #c62828 !important; }
        .modal { z-index: 1070 !important; }
        .modal-backdrop { z-index: 1065 !important; }
        .nivel-selector { background: #f0f4f1; padding: 10px; border-radius: 8px; border-left: 4px solid #2e7d32; width: fit-content; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/images/logo.svg}" alt="Logo" width="40" height="40"> Tenerife Natural
        </a>
        <a th:href="@{/logout}" class="btn btn-outline-success btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="map-card container mt-4">
    <div class="user-profile mb-3">
        <div class="nivel-selector">
            <label style="font-weight: bold; color: #2e7d32;">Tu Nivel Físico: </label>
            <select id="selector-nivel" onchange="cambiarNivelFisico(this.value)" style="padding: 5px; border-radius: 4px; border: 1px solid #2e7d32;">
                <option value="1">Principiante</option>
                <option value="2">Aficionado</option>
                <option value="3">Experto</option>
            </select>
        </div>
    </div>

    <h1 class="display-5 fw-bold text-center">Explora Tenerife Natural</h1>
    <p class="lead text-center">Clima real, Guaguas y Recomendaciones Personalizadas.</p>

    <div id="map" style="height: 600px; border-radius: 12px; border: 2px solid #e0e0e0; z-index: 1;"></div>

    <div class="mt-4 pb-5 text-center">
        <a th:href="@{/senderos}" class="btn btn-success btn-lg">⚙️ Gestionar mis Senderos</a>
    </div>
</div>

<div class="modal fade" id="modalNombreSendero" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">📍 Nuevo Sendero</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <p class="text-muted">Nombre para el sendero trazado: </p>
                <input type="text" id="inputNombreSendero" class="form-control" placeholder="Ej: Sendero del Teide">
            </div>
            <div class="modal-footer border-0">
                <button type="button" id="btnGuardarNombre" class="btn btn-success px-4">Guardar Sendero 🏁</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080">
    <div id="notificacionRuta" class="toast align-items-center text-white border-0 shadow" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="mensajeToast"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="cuadrado azul">cuadrado azul</div>
<script th:inline="javascript">
    /* Inyectamos los datos reales del usuario desde Java a JS */
    const USUARIO_REAL = {
        id: [[${usuarioLogueado.id}]],
        nivel: [[${usuarioLogueado.nivelFisico}]]
    };
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:src="@{/js/senderos.js}"></script>
</body>
</html>
